<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonBet — Ставки на ФТКЛ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary:#e94560; --primary-dark:#c23152; --bg-glass:rgba(18,22,35,0.8); --border-glass:rgba(255,255,255,0.06); --text:#fff; --text-secondary:#b0b0c0; --success:#2ecc71; --danger:#e74c3c; --card-bg:rgba(255,255,255,0.04); --card-border:rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat',sans-serif; }
        body { min-height:100vh; display:flex; justify-content:center; align-items:center; padding:10px; color:var(--text); background:#0b0b14; overflow-x:hidden; position:relative; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
        body::before{ content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 40%, rgba(233,69,96,0.12) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(100,100,255,0.08) 0%, transparent 50%), radial-gradient(circle at 50% 80%, rgba(0,200,200,0.06) 0%, transparent 50%); animation:bgShift 15s infinite alternate; z-index:-1; }
        body::after{ content:''; position:fixed; top:-100px; left:-100px; width:300px; height:300px; background:rgba(233,69,96,0.15); border-radius:50%; filter:blur(80px); animation:float1 20s infinite; z-index:-1; }
        @keyframes bgShift{ 0%{opacity:0.8} 100%{opacity:1} }
        @keyframes float1{ 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(60px,50px) scale(1.1)} 100%{transform:translate(0,0) scale(1)} }
        .app-container{ width:100%; max-width:480px; background:var(--bg-glass); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:36px; box-shadow:0 30px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(233,69,96,0.15); padding:25px 18px 100px; position:relative; min-height:90vh; display:flex; flex-direction:column; border:1px solid rgba(255,255,255,0.06); }
        .hidden{ display:none!important; }
        #welcomeScreen{ text-align:center; padding:50px 15px; }
        .welcome-logo{ font-size:4rem; font-weight:900; letter-spacing:4px; background:linear-gradient(to right, var(--primary) 38%, #ffffff 62%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:30px; }
        .welcome-text{ font-size:1.1rem; color:var(--text-secondary); margin-bottom:40px; }
        .continue-btn{ background:linear-gradient(135deg, var(--primary), var(--primary-dark)); border:none; padding:18px 50px; border-radius:60px; color:white; font-weight:700; font-size:1.3rem; cursor:pointer; width:85%; max-width:300px; box-shadow:0 10px 25px rgba(233,69,96,0.5); }
        .auth-form{ background:rgba(255,255,255,0.03); border-radius:30px; padding:30px 25px; border:1px solid var(--border-glass); margin-top:20px; }
        .auth-form h2{ text-align:center; margin-bottom:25px; font-size:2rem; color:var(--primary); }
        .input-group{ margin-bottom:20px; }
        .input-group label{ display:block; margin-bottom:6px; color:var(--text-secondary); font-size:0.9rem; }
        .input-group input{ width:100%; padding:16px; background:rgba(10,10,20,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:16px; color:#fff; font-size:1rem; outline:none; }
        .input-group input:focus{ border-color:var(--primary); }
        .auth-btn{ width:100%; padding:16px; background:var(--primary); border:none; border-radius:18px; color:white; font-weight:700; font-size:1.1rem; cursor:pointer; margin-top:10px; }
        .toggle-link{ text-align:center; margin-top:15px; color:var(--text-secondary); font-size:0.9rem; }
        .toggle-link a{ color:var(--primary); text-decoration:none; cursor:pointer; }
        .error-msg{ color:var(--danger); text-align:center; margin-top:10px; font-size:0.9rem; }
        .main-header{ display:flex; justify-content:center; align-items:center; margin-bottom:25px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:18px; }
        .logo-small{ font-size:2.2rem; font-weight:800; background:linear-gradient(to right, var(--primary) 38%, #ffffff 62%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .header-right{ position:absolute; right:0; top:50%; transform:translateY(-50%); }
        .logout-btn{ background:rgba(255,255,255,0.05); border:1px solid rgba(233,69,96,0.5); color:#fff; padding:8px 16px; border-radius:12px; font-weight:600; font-size:0.9rem; cursor:pointer; }
        .bottom-nav{ position:fixed; bottom:15px; left:50%; transform:translateX(-50%); width:calc(100% - 30px); max-width:450px; background:rgba(20,25,40,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:30px; display:flex; justify-content:space-around; padding:10px 8px; box-shadow:0 10px 30px rgba(0,0,0,0.5); border:1px solid rgba(233,69,96,0.15); z-index:10; }
        .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#8888a0; font-size:0.55rem; font-weight:500; cursor:pointer; padding:6px 2px; border-radius:18px; gap:3px; text-align:center; }
        .nav-item.active{ color:var(--primary); background:rgba(233,69,96,0.1); }
        .nav-item svg{ width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
        .tab-content{ flex:1; padding-bottom:20px; }
        .section-title{ font-size:1.3rem; font-weight:700; margin-bottom:18px; border-left:4px solid var(--primary); padding-left:15px; color:#f0f0ff; }
        .division-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:20px; }
        .division-card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:20px; text-align:center; font-weight:600; cursor:pointer; font-size:0.9rem; }
        .division-card:active{ background:rgba(233,69,96,0.2); border-color:var(--primary); }
        .match-list{ display:flex; flex-direction:column; gap:10px; }
        .match-item{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:18px; padding:16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-size:1rem; }
        .match-item:active{ background:rgba(233,69,96,0.1); border-color:var(--primary); }
        .match-item.selected{ border-color:var(--primary); background:rgba(233,69,96,0.15); }
        .match-item .check-icon{ width:22px; height:22px; border:2px solid #8888a0; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; }
        .match-item.selected .check-icon{ background:var(--primary); border-color:var(--primary); color:white; }
        .back-link{ color:var(--primary); cursor:pointer; font-weight:600; margin-bottom:15px; display:inline-block; }
        .bet-detail{ background:var(--card-bg); border-radius:20px; padding:20px; border:1px solid var(--card-border); }
        .odds-row{ display:flex; gap:10px; margin:20px 0; flex-wrap:wrap; }
        .odd-block{ flex:1; min-width:70px; background:rgba(0,0,0,0.4); border:2px solid transparent; border-radius:16px; padding:15px 8px; text-align:center; cursor:pointer; font-weight:600; }
        .odd-block.selected{ border-color:var(--primary); background:rgba(233,69,96,0.2); }
        .odd-value{ font-size:1.4rem; color:var(--primary); font-weight:800; }
        .bet-amount-input{ padding:14px; border-radius:14px; background:#0f0f1a; border:1px solid rgba(255,255,255,0.1); color:white; width:130px; font-size:1rem; margin-right:10px; }
        .action-btn{ background:var(--primary); border:none; padding:15px 22px; border-radius:15px; color:white; font-weight:700; cursor:pointer; font-size:0.95rem; box-shadow:0 4px 12px rgba(233,69,96,0.4); }
        .action-btn:active{ background:#ff5e7a; transform:scale(0.97); }
        .action-btn:disabled{ opacity:0.5; pointer-events:none; }
        .profile-stat{ background:var(--card-bg); padding:14px 18px; border-radius:14px; margin-bottom:10px; display:flex; justify-content:space-between; font-size:0.95rem; border:1px solid var(--card-border); }
        .news-item{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:14px 18px; margin-bottom:10px; cursor:pointer; font-weight:600; font-size:0.95rem; }
        .news-item:active{ background:rgba(233,69,96,0.1); }
        .news-detail{ background:rgba(0,0,0,0.3); border-radius:14px; padding:15px; margin-top:8px; color:#ccc; }
        .contact-btn{ display:flex; align-items:center; justify-content:center; gap:10px; background:var(--card-bg); border:1px solid rgba(233,69,96,0.4); border-radius:14px; padding:14px; margin-bottom:10px; color:#fff; font-weight:600; text-decoration:none; }
        .contact-btn svg{ width:18px; height:18px; }
        .leaderboard-table{ width:100%; border-collapse:collapse; font-size:0.9rem; }
        .leaderboard-table th{ text-align:left; padding:10px 8px; border-bottom:1px solid #333; color:#aaa; }
        .leaderboard-table td{ padding:10px 8px; border-bottom:1px solid #222; }
        .profit-positive{ color:var(--success); font-weight:700; }
        .modal-overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:flex; justify-content:center; align-items:center; z-index:1000; }
        .modal-content{ background:#1e1e2f; border-radius:28px; padding:25px; text-align:center; max-width:320px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.8); }
        .modal-btn{ margin-top:20px; padding:14px 28px; border-radius:30px; font-weight:700; font-size:1rem; border:none; cursor:pointer; width:100%; }
        .modal-btn.green{ background:var(--success); color:white; }
        .modal-btn.red{ background:var(--danger); color:white; }
        .filter-tabs{ display:flex; gap:5px; margin-bottom:15px; flex-wrap:wrap; }
        .filter-tab{ background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:7px 14px; font-size:0.75rem; font-weight:600; cursor:pointer; }
        .filter-tab.active{ background:var(--primary); border-color:var(--primary); color:white; }
        .status-icon{ width:16px; height:16px; vertical-align:middle; margin-right:3px; }
        .status-win{ color:var(--success); }
        .status-lose{ color:var(--danger); }
        .user-counter{ background:rgba(255,255,255,0.02); border:1px solid rgba(233,69,96,0.4); border-radius:18px; padding:18px; margin-top:20px; text-align:center; }
        .counter-title{ font-size:0.75rem; font-weight:500; letter-spacing:1.5px; color:var(--text-secondary); margin-bottom:8px; }
        .counter-number{ font-size:2.5rem; font-weight:800; background:linear-gradient(135deg, #4cff8d, #2ecc71); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div id="welcomeScreen">
        <div class="welcome-logo">TonBet</div>
        <div class="welcome-text">TonBet – Сайт новостника ФТКЛ. Ставки на все матчи ФТКЛ. Зарабатывайте коины и становитесь лучшими!</div>
        <button class="continue-btn" id="continueBtn">Продолжить</button>
    </div>

    <div id="authBlock" class="hidden">
        <div id="loginForm" class="auth-form">
            <h2>Вход</h2>
            <div class="input-group"><label>Никнейм</label><input type="text" id="loginUsername" placeholder="Введите ник"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="loginPassword" placeholder="Введите пароль"></div>
            <button class="auth-btn" id="loginBtn">Войти</button>
            <div class="toggle-link">Нет аккаунта? <a id="showRegisterLink">Зарегистрироваться</a></div>
            <div class="error-msg" id="loginError"></div>
        </div>
        <div id="registerForm" class="auth-form hidden">
            <h2>Регистрация</h2>
            <div class="input-group"><label>Никнейм</label><input type="text" id="regUsername" placeholder="Придумайте ник"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="input-group"><label>Подтвердите пароль</label><input type="password" id="regConfirmPassword" placeholder="Повторите пароль"></div>
            <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
            <div class="toggle-link">Уже есть аккаунт? <a id="showLoginLink">Войти</a></div>
            <div class="error-msg" id="regError"></div>
        </div>
    </div>

    <div id="mainInterface" class="hidden">
        <div class="main-header">
            <div class="logo-small">TonBet</div>
            <div class="header-right" id="headerRight"></div>
        </div>
        <div id="tabContent" class="tab-content"></div>
    </div>
</div>

<div id="bottomNav" class="bottom-nav hidden">
    <div class="nav-item active" data-tab="matches"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/></svg>Матчи</div>
    <div class="nav-item" data-tab="express"><svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Экспресс</div>
    <div class="nav-item" data-tab="mybets"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Мои ставки</div>
    <div class="nav-item" data-tab="profile"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</div>
    <div class="nav-item" data-tab="news"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Инфо</div>
    <div class="nav-item" data-tab="leaderboard"><svg viewBox="0 0 24 24"><path d="M6 9l6-6 6 6"/><path d="M6 15l6 6 6-6"/></svg>Топ 10</div>
</div>

<div id="adminBottomNav" class="bottom-nav hidden">
    <div class="nav-item active" data-tab="adminManage">Управление</div>
    <div class="nav-item" data-tab="adminAdd">Добавить</div>
    <div class="nav-item" data-tab="adminResults">Результаты</div>
</div>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCG1FHpgPg3xC9IHZ0SzaPn0Ngxk8IbwS4",
        authDomain: "tonbetftcl.firebaseapp.com",
        databaseURL: "https://tonbetftcl-default-rtdb.firebaseio.com",
        projectId: "tonbetftcl",
        storageBucket: "tonbetftcl.firebasestorage.app",
        messagingSenderId: "683608892991",
        appId: "1:683608892991:web:bd70872ad2f130b8a3ba8a"
    });
    const db = firebase.database();
    const DIVISIONS = ['ФТКЛ 1', 'ФТКЛ 3'];
    let users = [], matches = [];
    let currentUsername = sessionStorage.getItem('tonbet_current') || null;
    let currentFilter = 'all', currentTab = 'matches';
    const normName = n => n.toLowerCase().replace(/ё/g, 'е');

    async function loadData() {
        const [usersSnap, matchesSnap] = await Promise.all([
            db.ref('users').once('value'),
            db.ref('matches').once('value')
        ]);
        users = usersSnap.val() ? Object.values(usersSnap.val()) : [];
        matches = matchesSnap.val() ? Object.values(matchesSnap.val()) : [];
        // гарантируем, что у каждого пользователя есть bets
        users.forEach(u => u.bets = u.bets || []);
        ensureAdmins();
    }
    function ensureAdmins() {
        const admins = [
            { username: 'admin', password: 'admin123', role: 'admin', balance: 99999, bets: [] },
            { username: 'Astr0n', password: 'X7r!2pQa', role: 'admin', balance: 99999, bets: [] },
            { username: 'V0rt3x', password: 'M9z_3kLw', role: 'admin', balance: 99999, bets: [] },
            { username: 'N3bulous', password: 'R4s^8tUe', role: 'admin', balance: 99999, bets: [] }
        ];
        let updated = false;
        admins.forEach(a => { if (!users.find(u => u.username === a.username)) { users.push({...a, bets: a.bets || []}); updated = true; } });
        if (updated) saveUsers();
    }
    async function saveUsers() {
        const obj = {}; users.forEach((u, i) => obj[i] = u);
        await db.ref('users').set(obj);
    }
    async function saveMatches() {
        const obj = {}; matches.forEach((m, i) => obj[i] = m);
        await db.ref('matches').set(obj);
    }
    function getCurrentUser() { return users.find(u => u.username === currentUsername); }

    const els = {
        welcome: document.getElementById('welcomeScreen'),
        auth: document.getElementById('authBlock'),
        main: document.getElementById('mainInterface'),
        tab: document.getElementById('tabContent'),
        bottomNav: document.getElementById('bottomNav'),
        adminNav: document.getElementById('adminBottomNav'),
        headerRight: document.getElementById('headerRight')
    };

    function showWelcome() {
        els.welcome.classList.remove('hidden');
        els.auth.classList.add('hidden'); els.main.classList.add('hidden');
        els.bottomNav.classList.add('hidden'); els.adminNav.classList.add('hidden');
    }
    function showAuth() {
        els.welcome.classList.add('hidden');
        els.auth.classList.remove('hidden'); els.main.classList.add('hidden');
        els.bottomNav.classList.add('hidden'); els.adminNav.classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    }
    async function logout() {
        sessionStorage.removeItem('tonbet_current');
        currentUsername = null; els.headerRight.innerHTML = ''; showAuth();
    }
    async function showMain() {
        els.welcome.classList.add('hidden'); els.auth.classList.add('hidden');
        els.main.classList.remove('hidden');
        const user = getCurrentUser();
        els.headerRight.innerHTML = '';
        if (user && user.role === 'admin') {
            els.bottomNav.classList.add('hidden'); els.adminNav.classList.remove('hidden');
            currentTab = 'adminManage';
            document.querySelectorAll('#adminBottomNav .nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('#adminBottomNav .nav-item[data-tab="adminManage"]').classList.add('active');
            const btn = document.createElement('button'); btn.className = 'logout-btn'; btn.textContent = 'Выйти';
            btn.onclick = logout; els.headerRight.appendChild(btn);
        } else {
            els.bottomNav.classList.remove('hidden'); els.adminNav.classList.add('hidden');
            currentTab = 'matches';
            document.querySelectorAll('#bottomNav .nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('#bottomNav .nav-item[data-tab="matches"]').classList.add('active');
        }
        renderTab(currentTab);
        checkPendingBets();
    }

    document.getElementById('continueBtn').onclick = () => {
        if (currentUsername && users.some(u => u.username === currentUsername)) showMain();
        else showAuth();
    };
    document.getElementById('showRegisterLink').onclick = e => {
        e.preventDefault();
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    };
    document.getElementById('showLoginLink').onclick = e => {
        e.preventDefault();
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    };
    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('loginUsername').value.trim();
        const p = document.getElementById('loginPassword').value;
        if (!u || !p) return document.getElementById('loginError').textContent = 'Заполните все поля';
        const user = users.find(x => x.username === u && x.password === p);
        if (!user) return document.getElementById('loginError').textContent = 'Неверный ник или пароль';
        currentUsername = u; sessionStorage.setItem('tonbet_current', u);
        document.getElementById('loginUsername').value = ''; document.getElementById('loginPassword').value = '';
        showMain();
    };
    document.getElementById('registerBtn').onclick = async () => {
        const u = document.getElementById('regUsername').value.trim();
        const p = document.getElementById('regPassword').value;
        const pc = document.getElementById('regConfirmPassword').value;
        if (!u || !p || !pc) return document.getElementById('regError').textContent = 'Заполните все поля';
        if (p !== pc) return document.getElementById('regError').textContent = 'Пароли не совпадают';
        if (users.some(x => x.username === u)) return document.getElementById('regError').textContent = 'Ник занят';
        users.push({ username: u, password: p, balance: 1000, bets: [], role: 'user' });
        await saveUsers();
        alert('Регистрация успешна!');
        document.getElementById('regUsername').value = ''; document.getElementById('regPassword').value = '';
        document.getElementById('regConfirmPassword').value = '';
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    };

    document.querySelectorAll('#bottomNav .nav-item').forEach(item => item.onclick = () => {
        document.querySelectorAll('#bottomNav .nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentTab = item.dataset.tab; currentFilter = 'all';
        renderTab(currentTab);
    });
    document.querySelectorAll('#adminBottomNav .nav-item').forEach(item => item.onclick = () => {
        document.querySelectorAll('#adminBottomNav .nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentTab = item.dataset.tab;
        renderTab(currentTab);
    });

    function renderTab(tab) {
        els.tab.innerHTML = '';
        const user = getCurrentUser();
        if (user && user.role === 'admin') {
            if (tab === 'adminManage') renderAdminManage();
            else if (tab === 'adminAdd') renderAdminAdd();
            else if (tab === 'adminResults') renderAdminResults();
        } else {
            if (tab === 'matches') renderMatches();
            else if (tab === 'express') renderExpress();
            else if (tab === 'mybets') renderMyBets();
            else if (tab === 'profile') renderProfile();
            else if (tab === 'news') renderNews();
            else if (tab === 'leaderboard') renderLeaderboard();
        }
    }

    // ---------- ЭКСПРЕСС ----------
    let expressState = { step:'divisions', sel:[], div:null, outcomes:{}, totalOdds:0 };
    function renderExpress() {
        if (expressState.step === 'divisions') {
            els.tab.innerHTML = `<div class="section-title">Экспресс — Выберите дивизион</div><div class="division-grid"></div>`;
            const grid = els.tab.querySelector('.division-grid');
            DIVISIONS.forEach(d => { const c = document.createElement('div'); c.className = 'division-card'; c.textContent = d; c.onclick = () => { expressState.div = d; expressState.step = 'matches'; renderExpress(); }; grid.appendChild(c); });
        } else if (expressState.step === 'matches') {
            const open = matches.filter(m => m.division === expressState.div && m.status === 'open');
            els.tab.innerHTML = `<div class="back-link">← Назад</div><div class="section-title">Экспресс – ${expressState.div}</div><div class="match-list"></div><button class="action-btn" id="readyBtn" disabled>Готово (0)</button>`;
            els.tab.querySelector('.back-link').onclick = () => { expressState.step = 'divisions'; renderExpress(); };
            const list = els.tab.querySelector('.match-list');
            if (open.length === 0) list.innerHTML = '<div style="color:#aaa;text-align:center;padding:20px;">Нет матчей</div>';
            else open.forEach(m => {
                const d = document.createElement('div'); d.className = `match-item ${expressState.sel.includes(m.id) ? 'selected' : ''}`; d.dataset.id = m.id;
                d.innerHTML = `<span>${m.team1} — ${m.team2}</span><div class="check-icon">${expressState.sel.includes(m.id) ? '✓' : ''}</div>`;
                d.onclick = () => { if (expressState.sel.includes(m.id)) expressState.sel = expressState.sel.filter(x => x !== m.id); else expressState.sel.push(m.id); renderExpress(); };
                list.appendChild(d);
            });
            const btn = els.tab.querySelector('#readyBtn');
            btn.textContent = `Готово (выбрано ${expressState.sel.length})`;
            btn.disabled = expressState.sel.length < 2;
            btn.onclick = () => { if (expressState.sel.length >= 2) { expressState.step = 'outcomes'; expressState.outcomes = {}; renderExpress(); } };
        } else if (expressState.step === 'outcomes') {
            const selMatches = expressState.sel.map(id => matches.find(m => m.id === id)).filter(m => m);
            const idx = Object.keys(expressState.outcomes).length;
            if (idx >= selMatches.length) {
                let tot = 1; selMatches.forEach(m => { const out = expressState.outcomes[m.id]; let o = out === 'TB' ? m.odds_TB : out === 'TM' ? m.odds_TM : out === 'OZ' ? m.odds_OZ : m.odds[out]; tot *= o; });
                expressState.totalOdds = +tot.toFixed(2); expressState.step = 'bet'; renderExpress(); return;
            }
            const m = selMatches[idx];
            els.tab.innerHTML = `<div class="back-link">← Назад</div><div class="section-title">Исход ${idx+1}/${selMatches.length}</div>
                <div style="font-size:1.5rem;text-align:center;margin:20px 0;">${m.team1} — ${m.team2}</div>
                <div class="odds-row">
                    <div class="odd-block" data-out="1"><div>П1</div><div class="odd-value">${m.odds['1'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="X"><div>Ничья</div><div class="odd-value">${m.odds['X'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="2"><div>П2</div><div class="odd-value">${m.odds['2'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="TB"><div>ТБ 2.5</div><div class="odd-value">${m.odds_TB.toFixed(2)}</div></div>
                    <div class="odd-block" data-out="TM"><div>ТМ 2.5</div><div class="odd-value">${m.odds_TM.toFixed(2)}</div></div>
                    <div class="odd-block" data-out="OZ"><div>ОЗ</div><div class="odd-value">${m.odds_OZ.toFixed(2)}</div></div>
                </div>`;
            els.tab.querySelector('.back-link').onclick = () => { expressState.step = 'matches'; renderExpress(); };
            els.tab.querySelectorAll('.odd-block').forEach(b => b.onclick = () => { expressState.outcomes[m.id] = b.dataset.out; renderExpress(); });
        } else if (expressState.step === 'bet') {
            els.tab.innerHTML = `<div class="back-link">← Изменить исходы</div><div class="section-title">Коэффициент: ${expressState.totalOdds.toFixed(2)}</div>
                <div style="display:flex;gap:10px;align-items:center;margin-top:20px;">
                    <input type="number" class="bet-amount-input" id="expAmount" placeholder="Сумма" min="1">
                    <button class="action-btn" id="placeExpBet">Сделать ставку</button>
                </div>`;
            els.tab.querySelector('.back-link').onclick = () => { expressState.step = 'outcomes'; expressState.outcomes = {}; renderExpress(); };
            els.tab.querySelector('#placeExpBet').onclick = async () => {
                const user = getCurrentUser(); if (!user) return;
                const amount = +els.tab.querySelector('#expAmount').value;
                if (isNaN(amount) || amount <= 0) return alert('Некорректная сумма');
                if (amount > user.balance) return alert('Недостаточно средств');
                const legs = expressState.sel.map(id => { const m = matches.find(x => x.id === id); const out = expressState.outcomes[id]; let odds = out === 'TB' ? m.odds_TB : out === 'TM' ? m.odds_TM : out === 'OZ' ? m.odds_OZ : m.odds[out]; return { matchId: id, team1: m.team1, team2: m.team2, outcome: out, odds }; });
                user.balance -= amount; user.bets.push({ type: 'express', legs, totalOdds: expressState.totalOdds, amount, status: 'pending', winAmount: 0 });
                await saveUsers();
                alert('Ставка принята!');
                expressState = { step:'divisions', sel:[], div:null, outcomes:{}, totalOdds:0 };
                renderTab('express');
            };
        }
    }

            const m = matchState.match;
            els.tab.innerHTML = `<div class="back-link">← К матчам</div><div class="bet-detail">
                <div style="font-size:1.5rem;text-align:center;margin-bottom:15px;">${m.team1} — ${m.team2}</div>
                <div class="odds-row">
                    <div class="odd-block" data-out="1"><div>П1</div><div class="odd-value">${m.odds['1'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="X"><div>Ничья</div><div class="odd-value">${m.odds['X'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="2"><div>П2</div><div class="odd-value">${m.odds['2'].toFixed(2)}</div></div>
                    <div class="odd-block" data-out="TB"><div>ТБ 2.5</div><div class="odd-value">${m.odds_TB.toFixed(2)}</div></div>
                    <div class="odd-block" data-out="TM"><div>ТМ 2.5</div><div class="odd-value">${m.odds_TM.toFixed(2)}</div></div>
                    <div class="odd-block" data-out="OZ"><div>ОЗ</div><div class="odd-value">${m.odds_OZ.toFixed(2)}</div></div>
                </div>
                ${m.status === 'open' ? `<div style="display:flex;gap:10px;align-items:center;margin-top:20px;">
                    <input type="number" class="bet-amount-input" id="betAmount" placeholder="Сумма" min="1">
                    <button class="action-btn" id="placeBet">Ставка</button>
                </div>` : `<div style="margin-top:20px;color:#ffaa00;">Приём ставок закрыт</div>`}
            </div>`;
            els.tab.querySelector('.back-link').onclick = () => { matchState.view = 'matches'; renderMatches(); };
            if (m.status === 'open') {
                let selOut = null;
                els.tab.querySelectorAll('.odd-block').forEach(b => b.onclick = function() {
                    els.tab.querySelectorAll('.odd-block').forEach(x => x.classList.remove('selected'));
                    this.classList.add('selected'); selOut = this.dataset.out;

                    const user = getCurrentUser(); if (!user) return;

                    const amount = +els.tab.querySelector('#betAmount').value;
                    if (isNaN(amount) || amount <= 0) return alert('Некорректная сумма');
                    if (amount > user.balance) return alert('Недостаточно средств');
                    let odds = selOut === 'TB' ? m.odds_TB : selOut === 'TM' ? m.odds_TM : selOut === 'OZ' ? m.odds_OZ : m.odds[selOut];
                    user.balance -= amount;
                    user.bets.push({ type:'single', matchId:m.id, team1:m.team1, team2:m.team2, outcome:selOut, amount, odds, status:'pending', winAmount:0 });

    // ---------- МОИ СТАВКИ ----------
    function renderMyBets() {

        let bets = (user.bets || []).slice().reverse();
        if (currentFilter === 'pending') bets = bets.filter(b => b.status === 'pending');

                const st = bet.status === 'win' ? '<span class="status-win"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Выигрыш</span>'
                         : bet.status === 'lose' ? '<span class="status-lose"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Проигрыш</span>'
                         : '<span style="color:#aaa">Ожидание</span>';
                html += `<div style="background:var(--card-bg);border-radius:16px;padding:14px;margin-bottom:10px;">
                    <div style="display:flex;justify-content:space-between;"><strong>${bet.team1} — ${bet.team2}</strong><span>${out} @ ${bet.odds.toFixed(2)}</span></div>

    function renderLeaderboard() {
        const stats = users.filter(u => u.role !== 'admin').map(u => {

            if (!odds) return;
            const d = document.getElementById('newDiv').value;
            const t1 = document.getElementById('newTeam1').value.trim(), t2 = document.getElementById('newTeam2').value.trim();
            matches.push({ id:'m_'+Date.now(), division:d, team1:t1, team2:t2, odds:{ '1':odds['1'], 'X':odds['X'], '2':odds['2'] }, odds_TB:odds['TB'], odds_TM:odds['TM'], odds_OZ:odds['OZ'], status:'open', score:null, result:null });
            await saveMatches();
            alert('Матч добавлен!');
            document.getElementById('newTeam1').value = ''; document.getElementById('newTeam2').value = '';
            document.getElementById('calcOdds').style.display = 'none'; document.getElementById('addMatchBtn').style.display = 'none';
            odds = null;
        };
    }

    function renderAdminResults() {
        const list = matches.filter(m => m.status === 'closed' && !m.score);
        let html = '<div class="section-title">Ввод счёта</div>';
        if (list.length === 0) html += '<p style="color:#aaa;">Нет матчей для ввода счёта</p>';
        else list.forEach(m => {
            html += `<div style="background:var(--card-bg);border-radius:18px;padding:15px;margin-bottom:12px;">
                <strong>${m.team1} — ${m.team2}</strong> (${m.division})<br>
                <div style="display:flex;gap:10px;align-items:center;margin-top:10px;">
                    <input type="number" class="scoreT1" placeholder="${m.team1}" style="width:60px;background:#0f0f1a;color:white;padding:10px;border-radius:12px;">
                    <span>:</span>
                    <input type="number" class="scoreT2" placeholder="${m.team2}" style="width:60px;background:#0f0f1a;color:white;padding:10px;border-radius:12px;">
                    <button class="action-btn saveScore" data-id="${m.id}">Сохранить</button>
                </div></div>`;
        });
        els.tab.innerHTML = html;
        els.tab.querySelectorAll('.saveScore').forEach(b => b.onclick = async () => {
            const id = b.dataset.id;
            const t1 = +b.parentElement.querySelector('.scoreT1').value, t2 = +b.parentElement.querySelector('.scoreT2').value;
            if (isNaN(t1) || isNaN(t2)) return alert('Введите числа');
            const m = matches.find(x => x.id === id);
            if (m) {
                m.score = { t1, t2 }; m.result = (t1 > t2) ? '1' : (t1 === t2) ? 'X' : '2';
                await saveMatches();
                users.forEach(u => {
                    const bets = u.bets || [];
                    bets.forEach(bet => {
                        if (bet.status !== 'pending') return;
                        if (bet.type === 'single' && bet.matchId === id) {
                            let win = false;
                            if (['1','X','2'].includes(bet.outcome)) win = bet.outcome === m.result;
                            else if (bet.outcome === 'TB') win = (t1 + t2) > 2.5;
                            else if (bet.outcome === 'TM') win = (t1 + t2) < 2.5;
                            else if (bet.outcome === 'OZ') win = t1 > 0 && t2 > 0;
                            bet.status = win ? 'win' : 'lose'; if (win) { bet.winAmount = bet.amount * bet.odds; u.balance += bet.winAmount; }
                        } else if (bet.type === 'express') {
                            const allRes = bet.legs.every(l => { const m2 = matches.find(x => x.id === l.matchId); return m2 && m2.score; });
                            if (allRes) {
                                const allWin = bet.legs.every(l => {
                                    const m2 = matches.find(x => x.id === l.matchId);
                                    if (['1','X','2'].includes(l.outcome)) return l.outcome === m2.result;
                                    if (l.outcome === 'TB') return (m2.score.t1 + m2.score.t2) > 2.5;
                                    if (l.outcome === 'TM') return (m2.score.t1 + m2.score.t2) < 2.5;
                                    if (l.outcome === 'OZ') return m2.score.t1 > 0 && m2.score.t2 > 0;
                                });
                                bet.status = allWin ? 'win' : 'lose'; if (allWin) { bet.winAmount = bet.amount * bet.totalOdds; u.balance += bet.winAmount; }
                            }
                        }
                    });
                });
                await saveUsers();
                alert('Счёт сохранён, ставки рассчитаны!'); renderTab('adminResults');
            }
        });
    }

    function evaluateTeam(teamName) {
        const norm = normName(teamName);
        const finished = matches.filter(m => m.score && (normName(m.team1) === norm || normName(m.team2) === norm));
        if (finished.length === 0) return { form:3, crisis:false, matchesCount:0 };
        let points=0, diffTotal=0, bigLosses=0;
        finished.forEach(m => {
            const isT1 = normName(m.team1) === norm;
            const scored = isT1 ? m.score.t1 : m.score.t2, conceded = isT1 ? m.score.t2 : m.score.t1;
            const diff = scored - conceded; diffTotal += diff;
            if (scored > conceded) points += 3; else if (scored === conceded) points += 1;
            if (diff <= -3) bigLosses++;
        });
        const avg = points / finished.length;
        const crisis = bigLosses >= 2 && diffTotal <= -5;
        return { form: Math.min(10, Math.max(1, avg * 2.5)), crisis, matchesCount: finished.length };
    }
    function autoOdds(ev1, ev2) {
        let o1, o2, oX;
        if (ev1.crisis && !ev2.crisis) { o1 = 4.0 + Math.random() * 1.5; o2 = 1.4 + Math.random() * 0.6; }
        else if (ev2.crisis && !ev1.crisis) { o2 = 4.0 + Math.random() * 1.5; o1 = 1.4 + Math.random() * 0.6; }
        else {
            const total = ev1.form + ev2.form || 1;
            const p1 = ev1.form / total, p2 = ev2.form / total;
            const pX = Math.max(0.15, 0.3 - Math.abs(p1 - p2) * 0.3);
            const sum = p1 + p2 + pX, m = 0.92;
            o1 = Math.min(2.5, Math.max(1.5, m / (p1 / sum)));
            o2 = Math.min(2.5, Math.max(1.5, m / (p2 / sum)));
            oX = Math.min(3.5, Math.max(1.8, m / (pX / sum)));
        }
        const avgForm = (ev1.form + ev2.form) / 2;
        const tb = Math.min(2.4, Math.max(1.6, 2.0 - (avgForm - 3) * 0.15));
        const tm = Math.min(2.4, Math.max(1.6, 1.9 + (avgForm - 3) * 0.1));
        const oz = Math.min(2.5, Math.max(1.7, 2.1 + (avgForm - 3) * 0.3));
        return { '1':+o1.toFixed(2), 'X':+oX.toFixed(2), '2':+o2.toFixed(2), TB:+tb.toFixed(2), TM:+tm.toFixed(2), OZ:+oz.toFixed(2), form1:ev1.form.toFixed(1), form2:ev2.form.toFixed(1), matches1:ev1.matchesCount, matches2:ev2.matchesCount };
    }

    function checkPendingBets() {
        const user = getCurrentUser(); if (!user || user.role === 'admin') return;
        const resolved = [];
        (user.bets || []).forEach(bet => {
            if (bet.status !== 'pending') return;
            if (bet.type === 'single') {
                const m = matches.find(x => x.id === bet.matchId);
                if (m && m.score) {
                    let win = false;
                    if (['1','X','2'].includes(bet.outcome)) win = bet.outcome === m.result;
                    else if (bet.outcome === 'TB') win = (m.score.t1 + m.score.t2) > 2.5;
                    else if (bet.outcome === 'TM') win = (m.score.t1 + m.score.t2) < 2.5;
                    else if (bet.outcome === 'OZ') win = m.score.t1 > 0 && m.score.t2 > 0;
                    bet.status = win ? 'win' : 'lose'; if (win) { bet.winAmount = bet.amount * bet.odds; user.balance += bet.winAmount; }
                    resolved.push({ bet, match:m });
                }
            } else if (bet.type === 'express') {
                const allRes = bet.legs.every(l => { const m = matches.find(x => x.id === l.matchId); return m && m.score; });
                if (allRes) {
                    const allWin = bet.legs.every(l => {
                        const m = matches.find(x => x.id === l.matchId);
                        if (['1','X','2'].includes(l.outcome)) return l.outcome === m.result;
                        if (l.outcome === 'TB') return (m.score.t1 + m.score.t2) > 2.5;
                        if (l.outcome === 'TM') return (m.score.t1 + m.score.t2) < 2.5;
                        if (l.outcome === 'OZ') return m.score.t1 > 0 && m.score.t2 > 0;
                    });
                    bet.status = allWin ? 'win' : 'lose'; if (allWin) { bet.winAmount = bet.amount * bet.totalOdds; user.balance += bet.winAmount; }
                    resolved.push({ bet, match:null });
                }
            }
        });
        saveUsers().then(() => { if (resolved.length) showNotifications(resolved); });
    }

    function showNotifications(list) {
        let idx = 0;
        function show() {
            if (idx >= list.length) return;
            const { bet, match } = list[idx];
            const win = bet.status === 'win';
            const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal-content">
                <div style="font-size:1.2rem;margin-bottom:15px;">${bet.type==='express'?'Ваш экспресс':'Ваша ставка'} ${win?'выиграла':'проиграла'}</div>
                ${bet.type==='single'?`<div><strong>${match.team1} — ${match.team2}</strong></div>`:''}
                <div style="font-size:2rem;font-weight:800;color:${win?'var(--success)':'var(--danger)'};">${win?'СЫГРАЛА':'НЕ СЫГРАЛА'}</div>
                <div style="margin-top:15px;color:#aaa;">Баланс обновлён в Профиле</div>
                <button class="modal-btn ${win?'green':'red'} closeModal">Ок</button>
            </div>`;
            document.body.appendChild(overlay);
            const close = overlay.querySelector('.closeModal');
            const timer = setTimeout(() => { overlay.remove(); idx++; show(); }, 7000);
            close.onclick = () => { clearTimeout(timer); overlay.remove(); idx++; show(); };
        }
        show();
    }

    window.onload = async () => {
        await loadData();
        if (currentUsername && users.some(u => u.username === currentUsername)) await showMain();
        else showWelcome();
        db.ref('matches').on('value', s => { matches = s.val() ? Object.values(s.val()) : []; if (!els.welcome.classList.contains('hidden') && currentTab) renderTab(currentTab); });
        db.ref('users').on('value', s => { users = s.val() ? Object.values(s.val()) : []; users.forEach(u => u.bets = u.bets || []); ensureAdmins(); if (currentTab === 'news') renderTab('news'); });
    };
</script>
